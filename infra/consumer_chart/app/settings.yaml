cache:
  MAIN:
    password: ''
    ssl: false
    endpoints:
      0: 'zinc-maincache:6379'
  LIVE:
    password: ''
    ssl: false
    endpoints:
      0: 'tin-livecache-master:6379'
  STREAM:
    password: ''
    ssl: false
    endpoints:
      0: 'zinc-streamcache-master:6379'

# the amount of time before the pollers and reserver stops
buffers:
  closing: 120

ktmb:
  apiUrl: https://online-api.ktmb.com.my
  appUrl: https://shuttleonline-api.ktmb.com.my
  requestSignature: ''
  proxy: ''
  loginKey: 'login-session'
  # warm connection pool + DNS cache; 0 = off (plain pooled client). Enable per
  # module (e.g. reserver) where latency matters.
  warmPoolSize: 0
  warmIntervalMs: 30000
  dnsRefreshMs: 60000
buyer:
  backoffLimit: 3
  contactNumber: '+6581272251'
  sleepBuffer: 3
  scheme: http
  host: localhost
  port: 9000
  completeRetries: 5
  parkRetries: 5
  conflictPatterns:
    # KTMB's actual SetPassenger message is "Duplicated passport number for
    # onward trip : <passport>." — note "Duplicated", not "duplicate", so the
    # old 'duplicate passport' substring never matched and conflicts fell
    # through to the generic-error path (booking stranded in Buying, never
    # parked for recovery). Match the real wording; keep the old one too.
    - 'duplicated passport'
    - 'duplicate passport'
  # KTMB error substrings that mean a transient, ticket-less buy failure — the
  # buyer reverts these bookings Buying -> Pending to retry (e.g. the KTMB
  # e-wallet ran out of funds at Pay: "KTM Wallet balance is insufficient.").
  revertPatterns:
    - 'wallet balance is insufficient'

terminator:
  backoffLimit: 3
  queueName: 'terminator'

recoverer:
  queueName: 'recover'
  drainCron: '@every 15m'
  sweepCron: '@every 1h'
  maxAttempts: 5
  # missing-ticket repair sweep: on each sweep tick, list Completed bookings
  # whose ticket file is missing and restore them by re-downloading the PDF
  # from KTMB (PrintTicketPdf) and re-attaching it to zinc. Read-mostly and
  # idempotent, so it is safe to leave enabled everywhere.
  repairEnable: true
  repairLimit: 100
  # KTMB PrintTicket error substrings that DEFINITIVELY mean the booking or
  # ticket is unknown to KTMB — only these park the booking for a human; any
  # other error (network, 5xx, session expiry) is retried next sweep. An empty
  # list never parks (misconfiguration degrades to retry-forever, never to a
  # wrongful park).
  repairNotFoundPatterns:
    - 'not found'
    - 'no record'
    - 'invalid booking'

withdrawer:
  # gate for the approve sweep: false = withdrawals pay out only when a human
  # clicks approve in zinc (the reconcile sweep below keeps running either way
  # so in-flight payouts still settle)
  approveEnable: false
  # robfig/cron v1 spec with a leading seconds field, evaluated in UTC:
  # '0 0 0 * * *' = every day at 00:00:00 UTC
  cron: '0 0 0 * * *'
  # reconcile sweep of Processing withdrawals against Airwallex:
  # '0 0 */6 * * *' = every 6 hours at 00/06/12/18 UTC
  reconcileCron: '0 0 */6 * * *'
  limit: 100

app:
  landscape: lapras
  platform: nitroso
  service: tin
  module: cdc
  version: 1.0.0

stream:
  cdc: cdc
  update: update
  enrich: enricher
  reserver: reserver

encryptor:
  key: ''

reserver:
  group: reserver
  backoffLimit: 3
  normalConcurrency: 50
  maintenanceConcurrency: 50
  normalAttempts: 3
  maintenanceAttempts: 15

enricher:
  group: enricher
  backoffLimit: 3

  email: kirinnee97@gmail.com
  password: ''

  userDataKey: ktmb:userData
  storeKey: ktmb:store

  # ms between launching each per-slot enrichment (1 with IP rotation; was 16000)
  delay: 1

cdc:
  group: cdc
  scheme: http
  host: localhost
  port: 9000
  parallelism: 8
  backoffLimit: 3

pool:
  logins: '' # JSON: [{"email":"..","password":".."}] (set via ATOMI_POOL__LOGINS secret)
  key: 'ktmb:pool' # Redis HASH: field=email, value=encrypted userData

poller:
  group: poller
  backoffLimit: 3
  # max streams (date-direction targets) per helium pod; 0 = no sharding (one pod)
  shardSize: 15
  # cap on total streams per run: sort targets by date, keep the first N
  # (42 = ~3 weeks x 2 directions); 0 = no cap
  maxStreams: 42
  pollee:
    namespace: 'nitroso'
    image: ''
    version: ''
    secretRef: ''
    configRef: ''

otel:
  metric:
    enable: false
    reader: {}
    exporter:
      exporterType: console
  trace:
    enable: false
    processor:
      processorType: sync
    exporter:
      exporterType: console
  log:
    zerolog:
      timeFormat: unix # unix, unixms, unixmicro, unixnano, rfc3339, rfc3339Nano, rfc822, rfc850, rfc822z, rfc1123, rfc1123Z
      durationFieldInteger: true
      logLevel: debug # trace, debug, info, warn, error, fatal, panic, none

      stacktrace: true
      caller: true
      timestamp: true
      pretty: false

      fields:
        caller: caller
        timestamp: timestamp
        error: error
        errorStack: stack
        level: level
        message: message
        traceId: traceId
        spanId: spanId
